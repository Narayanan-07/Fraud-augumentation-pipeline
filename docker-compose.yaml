version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - pipeline-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    command: python pipeline/producer.py
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    networks:
      - pipeline-net

  stream-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: stream-processor
    depends_on:
      kafka:
        condition: service_healthy
    # FIXED: Using -m to prevent the ModuleNotFoundError!
    command: python -m pipeline.stream_processor
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./augmentation:/app/augmentation
      - ./tmp:/app/tmp
      - ./pipeline:/app/pipeline
    networks:
      - pipeline-net

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    container_name: dashboard
    ports:
      - "8501:8501"
    depends_on:
      - stream-processor
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./evaluation:/app/evaluation
    networks:
      - pipeline-net

networks:
  pipeline-net:
    driver: bridge